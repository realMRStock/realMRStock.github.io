<!DOCTYPE HTML>
<html>
	<head>
		<title>Dr. Matthias Raphael Stock</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.6/css/academicons.min.css">
		
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<div id="wrapper">
			<header id="header">
				</header>

			<div id="main">
				</div>

			<footer id="footer">
				<p class="copyright">&copy; Dr. Matthias Raphael Stock. Design: <a href="https://html5up.net">HTML5 UP</a>.</p>
			</footer>
		</div>

		<div id="bg"></div>

		<button id="themeToggle" class="theme-toggle" aria-label="Design umschalten">
			<i class="fa-regular fa-moon"></i>
			<i class="fa-regular fa-sun"></i>
			<span class="knob"></span>
		</button>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
		<script>
			(function () {
				const btn = document.getElementById('themeToggle');
				if (!btn) return;
				
				// Theme laden
				if (localStorage.getItem('theme') === 'light') {
					document.body.classList.add('light-mode');
				}
				
				btn.addEventListener('click', () => {
					const isLight = document.body.classList.toggle('light-mode');
					localStorage.setItem('theme', isLight ? 'light' : 'dark');
				});
			})();
		</script>
	</body>
</html>
